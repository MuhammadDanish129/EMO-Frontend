<!-- Start::Header -->
<header class="app-header">
  <nav class="main-header !h-[3.75rem]" aria-label="Global">
    <div class="main-header-container ps-[0.725rem] pe-[1rem] ">

      <div class="header-content-left">

        <div class="header-element">
          <div class="horizontal-logo">
            <a routerLink="/dashboard/crm" class="header-logo">
              <img src="./assets/images/brand-logos/desktop-logo.png" alt="logo" class="desktop-logo">
              <img src="./assets/images/brand-logos/toggle-logo.png" alt="logo" class="toggle-logo">
              <img src="./assets/images/brand-logos/desktop-dark.png" alt="logo" class="desktop-dark">
              <img src="./assets/images/brand-logos/toggle-dark.png" alt="logo" class="toggle-dark">
              <img src="./assets/images/brand-logos/desktop-white.png" alt="logo" class="desktop-white">
              <img src="./assets/images/brand-logos/toggle-white.png" alt="logo" class="toggle-white">
            </a>
          </div>
        </div>
        <!-- End::header-element -->
        <!-- Start::header-element -->
        <div class="header-element md:px-[0.325rem] !items-center">
          <!-- Start::header-link -->
          <a aria-label="Hide Sidebar"
            class="sidemenu-toggle animated-arrow  hor-toggle horizontal-navtoggle inline-flex items-center"
            href="javascript:void(0);" (click)="toggleSidebar()"><span></span></a>
          <!-- End::header-link -->
        </div>
        <!-- End::header-element -->
      </div>

            class="inline-flex flex-shrink-0 justify-center items-center gap-2" [ngClass]="{
                  '!rounded-full': !isFullScreen,
                  'font-medium': true,
                  'dark:hover:bg-black/20 dark:text-[#8c9097] dark:text-white/50 dark:hover:text-white dark:focus:ring-white/10 dark:focus:ring-offset-white/10': true
                }">
            <i class="bx bx-fullscreen full-screen-open header-link-icon" [hidden]="!fullScreenIconVisible"></i>
            <i class="bx bx-exit-fullscreen full-screen-close header-link-icon"
              [hidden]="!exitFullScreenIconVisible"></i>
          </a>

          <!-- End::header-link -->
        </div>
        <!-- End Full screen -->
