<!-- MODAL CONTAINER -->
<div class="w-full rounded-t-xl bg-[rgb(var(--light))]  max-h-[90vh] flex flex-col">

  <!-- MODAL HEADER -->
  <!-- MODAL HEADER -->
  <div class="flex items-center justify-between
            px-6 py-3
            bg-[rgb(var(--primary))]
            shadow-md">

    <span class="text-sm font-semibold tracking-wide text-white">
      {{ isEditMode ? 'Update User Type' : 'Add User Type' }}
    </span>

    <button class="rounded-lg p-2
           text-white/80
           bg-white/10
           hover:bg-red
           transition" (click)="close()">
      <i class="las la-times text-lg"></i>
    </button>
  </div>
  <!-- ================= BODY ================= -->
  <div class="px-6 py-5 overflow-y-auto space-y-5">

    <!-- USER TYPE NAME -->
    <div class="space-y-1.5 yx-field">
      <label class="yx-label block text-xs font-semibold
           text-[rgb(var(--default-text-color))]">
        User Type Name
        <span class="text-[rgb(var(--danger))]">*</span>
      </label>

      <input type="text" class="yx-input w-full rounded-lg border px-3 py-2 text-sm
           border-[rgb(var(--input-border))]
           text-[rgb(var(--default-text-color))]
           placeholder:text-[rgb(var(--text-muted))]" [(ngModel)]="model.userTypeName"
        (ngModelChange)="onUserTypeNameChange()" [class.yx-error]="fieldErrors.userTypeName" />

      <p *ngIf="fieldErrors.userTypeName" class="text-xs font-medium text-[rgb(var(--danger))]">
        {{ fieldErrors.userTypeName }}
      </p>

      <p *ngIf="!fieldErrors.userTypeName" class="text-[11px] text-[rgb(var(--text-muted))]">
        This name will be displayed across the system.
      </p>
    </div>

    <div class="space-y-1.5 yx-field">
      <label class="yx-label block text-xs font-semibold
           text-[rgb(var(--default-text-color))]">
        User Type Level
        <span class="text-[rgb(var(--red-500))]">*</span>
      </label>

      <input type="text" class="yx-input w-full rounded-lg border px-3 py-2 text-sm
           border-[rgb(var(--input-border))]
           text-[rgb(var(--default-text-color))]
           placeholder:text-[rgb(var(--text-muted))]" [(ngModel)]="model.userTypeLevel"
        (ngModelChange)="onUserTypeNameChange()" [class.yx-error]="fieldErrors.userTypeLevel" />

      <p *ngIf="fieldErrors.userTypeLevel" class="text-xs font-medium text-[rgb(var(--danger))]">
        {{ fieldErrors.userTypeLevel }}
      </p>

      <p *ngIf="!fieldErrors.userTypeLevel" class="text-[11px] text-[rgb(var(--text-muted))]">
        This Level will define the user type hierarchy.
      </p>
    </div>

    <!-- ACTIVE STATUS -->
    <div class="rounded-lg border border-[rgb(var(--gray-200))] p-4 flex justify-between items-center">
              <div>
                <p class="text-sm font-medium">Active Status</p>
                <p class="text-xs text-muted">Inactive user types cannot be assigned.</p>
              </div>

      <!-- MATERIAL TOGGLE -->
      <mat-slide-toggle [(ngModel)]="model.isActive" color="primary">
      </mat-slide-toggle>

    </div>
    <!-- MODAL BODY
    <div class="px-6 py-5 overflow-y-auto space-y-5">

      


    </div> -->

   

  </div>
 <!-- MODAL FOOTER -->
    <div class="flex items-center justify-end gap-3
              px-6 py-4 border-t
              border-[rgb(var(--default-border))]">

      <button class="rounded-lg px-4 py-2 text-sm font-medium hover:bg-red hover:text-white
             border border-[rgb(var(--gray-300))]" (click)="close()">
        Cancel
      </button>

      <button class="rounded-lg px-5 py-2 text-sm font-semibold
         bg-[rgb(var(--primary-600))]
         text-white
         hover:bg-[rgb(var(--primary-700))]
         transition
         disabled:opacity-60
         disabled:cursor-not-allowed
         flex items-center gap-2" (click)="save()" [disabled]="isSaving">

        <span *ngIf="isSaving" class="h-4 w-4 animate-spin rounded-full
               border-2 border-white/40
               border-t-white">
        </span>

        {{ isSaving
        ? (isEditMode ? 'Updating...' : 'Saving...')
        : (isEditMode ? 'Update User Type' : 'Save User Type') }}
      </button>



    </div>
    
</div>
