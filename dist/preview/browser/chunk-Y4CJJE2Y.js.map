<!-- MODAL CONTAINER -->
<div class="w-full max-w-md rounded-t-xl bg-[rgb(var(--light))] shadow-xl">

    <!-- HEADER -->
    <div class="flex items-center justify-between px-6 py-3 bg-[rgb(var(--primary))] shadow-md">
        <span class="text-sm font-semibold tracking-wide text-white">
            {{ isEditMode ? 'Update Facility' : 'Add Facility' }}
        </span>

        <button class="rounded-lg p-2 text-white/80 bg-white/10 hover:bg-red transition" (click)="close()">
            <i class="las la-times text-lg"></i>
        </button>
    </div>

    <!-- BODY -->
    <div class="px-6 py-5 space-y-5">

        <!-- FACILITY NAME -->
        <div class="space-y-1.5 yx-field">
            <label class="yx-label block text-xs font-semibold">
                Facility Name <span class="text-[rgb(var(--red-500))]">*</span>
            </label>

            <input type="text" class="yx-input w-full rounded-lg border px-3 py-2 text-sm"
                [(ngModel)]="model.facilityName" [class.yx-error]="fieldErrors.facilityName" />

            <p *ngIf="fieldErrors.facilityName" class="text-xs font-medium text-[rgb(var(--danger))]">
                {{ fieldErrors.facilityName }}
            </p>
        </div>

        <!-- FACILITY ADDRESS -->
        <div class="space-y-1.5 yx-field">
            <label class="yx-label block text-xs font-semibold">
                Facility Address
            </label>

            <input type="text" class="yx-input w-full rounded-lg border px-3 py-2 text-sm"
                [(ngModel)]="model.facilityaddress" />
        </div>

        <!-- ACTIVE -->
        <div class="rounded-lg border border-[rgb(var(--gray-200))] p-4 flex justify-between items-center">
            <div>
                <p class="text-sm font-medium">Active Status</p>
                <p class="text-xs text-[rgb(var(--text-muted))]">
                    Inactive facilities cannot be used.
                </p>
            </div>

            <mat-slide-toggle [(ngModel)]="model.isActive" color="primary">
            </mat-slide-toggle>
        </div>

    </div>

    <!-- FOOTER -->
    <div class="flex items-center justify-end gap-3 px-6 py-4 border-t
              border-[rgb(var(--default-border))]">

        <button class="rounded-lg px-4 py-2 text-sm font-medium hover:bg-red hover:text-white
             border border-[rgb(var(--gray-300))]" (click)="close()">
            Cancel
        </button>

        <button class="rounded-lg px-5 py-2 text-sm font-semibold
             bg-[rgb(var(--primary-600))] text-white
             hover:bg-[rgb(var(--primary-700))]
             flex items-center gap-2
             disabled:opacity-60" [disabled]="isSaving" (click)="save()">

            <span *ngIf="isSaving" class="h-4 w-4 animate-spin rounded-full
               border-2 border-white/40 border-t-white">
            </span>

            {{ isSaving
            ? (isEditMode ? 'Updating...' : 'Saving...')
            : (isEditMode ? 'Update Facility' : 'Save Facility') }}
        </button>

    </div>

</div>
