<div class="w-full rounded-t-xl bg-[rgb(var(--light))] shadow-xl max-h-[90vh] flex flex-col">

  <!-- ================= HEADER ================= -->
  <div class="flex items-center justify-between px-6 py-3 bg-[rgb(var(--primary))]">

    <span class="text-sm font-semibold text-white">
      {{ isViewMode ? 'Sensor Details'
        : isEditMode ? 'Update Sensor'
        : 'Add Sensor' }}
    </span>

    <button
      type="button"
      class="rounded-lg p-2 text-white/80 bg-white/10 hover:bg-white/20"
      (click)="close()">
      <i class="las la-times"></i>
    </button>

  </div>


  <!-- ================= BODY (SCROLLABLE) ================= -->
  <div class="px-6 py-4 overflow-y-auto space-y-4">

    <!-- ================= SENSOR DETAILS ================= -->
    <div class="rounded-lg p-5 space-y-4 border border-[rgb(var(--gray-200))]">

      <p class="text-[rgb(var(--primary))] font-semibold uppercase tracking-wide text-muted">
        Sensor Details
      </p>

      <!-- SENSOR NAME -->
      <div class="yx-field">
        <label class="yx-label">Sensor Name</label>

        <input class="yx-input w-full"
          [(ngModel)]="model.sensorName"
          [disabled]="isViewMode" />
      </div>

      <!-- MODBUS -->
      <div class="yx-field">
        <label class="yx-label">Modbus Address</label>

        <input class="yx-input w-full"
          [(ngModel)]="model.modebusAddress"
          [disabled]="isViewMode" />
      </div>

      <!-- METER -->
      <div class="yx-field">
        <label class="yx-label">Meter Id</label>

        <input class="yx-input w-full"
          [(ngModel)]="model.meterId"
          [disabled]="isViewMode" />
      </div>

      <!-- SERIAL -->
      <div class="yx-field">
        <label class="yx-label">Serial Address</label>

        <input class="yx-input w-full"
          [(ngModel)]="model.serialAddress"
          [disabled]="isViewMode" />
      </div>

    </div>


    <!-- ================= SENSOR LINKING ================= -->
    <div class="rounded-lg p-5 space-y-4 border border-[rgb(var(--gray-200))]">

      <p class="text-[rgb(var(--primary))] font-semibold uppercase tracking-wide text-muted">
        Sensor Linking
      </p>

      <!-- OFFICE -->
      <div class="yx-field">

        <label class="yx-label">Office</label>

        <!-- VIEW MODE -->
        <div *ngIf="isViewMode"
          class="yx-input w-full bg-gray-50">
          {{ selectedOfficeName }}
        </div>

        <!-- EDIT MODE -->
        <yx-select *ngIf="!isViewMode"
         
          [items]="offices"
          labelKey="officeName"
          valueKey="officeId"
          placeholder="Select Office"
          [(value)]="model.fkOffice">
        </yx-select>

      </div>


      <!-- DEVICE -->
      <div class="yx-field">

        <label class="yx-label">Device</label>

        <div *ngIf="isViewMode"
          class="yx-input w-full bg-gray-50">
          {{ selectedDeviceName }}
        </div>

        <yx-select *ngIf="!isViewMode"
          [items]="devices"
          labelKey="deviceName"
          valueKey="deviceId"
          placeholder="Select Device"
          [(value)]="model.fkDevice">
        </yx-select>

      </div>


      <!-- UTILITY -->
      <div class="yx-field">

        <label class="yx-label">Utility</label>

        <div *ngIf="isViewMode"
          class="yx-input w-full bg-gray-50">
          {{ selectedUtilityName }}
        </div>

        <yx-select *ngIf="!isViewMode"
          [items]="utilities"
          labelKey="utilityName"
          valueKey="utilityId"
          placeholder="Select Utility"
          [(value)]="model.fkutility">
        </yx-select>

      </div>

    </div>

  </div>


  <!-- ================= FOOTER ================= -->
  <div class="flex justify-end gap-3 px-6 py-4 border-t">

    <button
      type="button"
      class="border rounded-lg px-4 py-2"
      (click)="close()">
      Cancel
    </button>

    <button
      *ngIf="!isViewMode"
      type="button"
      class="rounded-lg px-6 py-2 bg-[rgb(var(--primary))] text-white"
      [disabled]="isSaving"
      (click)="save()">

      {{ isEditMode ? 'Update Sensor' : 'Save Sensor' }}

    </button>

  </div>

</div>
