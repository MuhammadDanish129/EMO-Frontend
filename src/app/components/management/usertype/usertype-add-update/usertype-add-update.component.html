<!-- MODAL CONTAINER -->
<div class="w-full max-w-md rounded-xl bg-white shadow-xl">

  <!-- MODAL HEADER -->
  <!-- MODAL HEADER -->
  <div class="flex items-center justify-between
            px-6 py-3
            bg-[rgb(var(--primary))]
            shadow-md">

  <span class="text-sm font-semibold tracking-wide text-white">
    {{ isEditMode ? 'Update User Type' : 'Add User Type' }}
  </span>

  <button
    class="rounded-lg p-2
           text-white/80
           bg-white/10
           hover:bg-white/20
           transition"
    (click)="close()">
    <i class="las la-times text-lg"></i>
  </button>
</div>



  <!-- MODAL BODY -->
  <div class="px-6 py-5 space-y-5">

    <!-- USER TYPE NAME -->
    <div class="space-y-1.5">
      <label class="block text-xs font-semibold
               text-[rgb(var(--default-text-color))]">
        User Type Name
        <span class="text-[rgb(var(--red-500))]">*</span>
      </label>

      <input type="text" [(ngModel)]="model.userTypeName" placeholder="e.g. Admin, Manager" class="w-full rounded-lg border px-3 py-2 text-sm
               border-[rgb(var(--input-border))]
               text-[rgb(var(--default-text-color))]
               placeholder:text-[rgb(var(--text-muted))]
               focus:outline-none
               focus:ring-2
               focus:ring-[rgb(var(--primary-300))]
               focus:border-[rgb(var(--primary-400))]" />

      <p class="text-[11px] text-[rgb(var(--text-muted))]">
        This name will be displayed across the system.
      </p>
    </div>

    <!-- ACTIVE STATUS -->
    <!-- ACTIVE STATUS -->
    <div class="flex items-center justify-between
            rounded-lg border p-3
            border-[rgb(var(--default-border))]">

      <div>
        <p class="text-sm font-medium
              text-[rgb(var(--default-text-color))]">
          Active Status
        </p>
        <p class="text-xs text-[rgb(var(--text-muted))]">
          Inactive user types cannot be assigned.
        </p>
      </div>

      <!-- MATERIAL TOGGLE -->
      <mat-slide-toggle [(ngModel)]="model.isActive" color="primary">
      </mat-slide-toggle>

    </div>


  </div>

  <!-- MODAL FOOTER -->
  <div class="flex items-center justify-end gap-3
              px-6 py-4 border-t
              border-[rgb(var(--default-border))]">

    <button class="rounded-lg px-4 py-2 text-sm font-medium
             border
             border-[rgb(var(--gray-300))]
             text-[rgb(var(--default-text-color))]
             hover:bg-[rgb(var(--gray-100))]
             transition" (click)="close()">
      Cancel
    </button>

    <button class="rounded-lg px-5 py-2 text-sm font-semibold
         bg-[rgb(var(--primary-600))]
         text-white
         hover:bg-[rgb(var(--primary-700))]
         transition" (click)="save()">

      {{ isEditMode ? 'Update User Type' : 'Save User Type' }}

    </button>


  </div>

</div>
