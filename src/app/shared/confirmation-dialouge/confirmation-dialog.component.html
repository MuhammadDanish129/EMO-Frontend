<div class="box bg-white border-0 relative yx-confirm-dialog">

  <!-- CLOSE BUTTON -->
  <button
    type="button"
    class="yx-dialog-close"
    (click)="cancel()"
    aria-label="Close">
    <i class="bi bi-x"></i>
  </button>

  <!-- CONTENT -->
  <div
    class="custom-alert1 text-center px-6 pt-5 pb-2"
    [ngClass]="{
      'alert-primary': data.variant === 'info',
      'alert-warning': data.variant === 'warning',
      'alert-danger': data.variant === 'danger'
    }">

    <!-- ICON -->
    <svg
      class="custom-alert-icon inline-flex mb-2"
      [ngClass]="{
        'fill-primary': data.variant === 'info',
        'fill-warning': data.variant === 'warning',
        'fill-danger': data.variant === 'danger'
      }"
      xmlns="http://www.w3.org/2000/svg"
      height="1.6rem"
      width="1.6rem"
      viewBox="0 0 24 24">

      <path d="M0 0h24v24H0z" fill="none" />

      <!-- INFO -->
      <path *ngIf="data.variant === 'info'"
        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" />

      <!-- WARNING -->
      <path *ngIf="data.variant === 'warning'"
        d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" />

      <!-- DANGER -->
      <path *ngIf="data.variant === 'danger'"
        d="M15.73 3H8.27L3 8.27v7.46L8.27 21h7.46L21 15.73V8.27L15.73 3zM12 17.3c-.72 0-1.3-.58-1.3-1.3 0-.72.58-1.3 1.3-1.3.72 0 1.3.58 1.3 1.3 0 .72-.58 1.3-1.3 1.3zm1-4.3h-2V7h2v6z" />
    </svg>

    <!-- TITLE -->
    <h5 class="text-[1.15rem] font-medium mb-1">
      {{ data.title || 'Confirmation' }}
    </h5>

    <!-- MESSAGE -->
    <p class="text-sm mb-0 leading-relaxed">
      {{ data.message || 'Are you sure you want to continue?' }}
    </p>

  </div>

  <!-- ACTIONS -->
  <div class="flex justify-center gap-3 pt-3 pb-4 border border-[(rgb(var(--light)))]">

    <!-- CANCEL -->
    <button
      type="button"
      class="ti-btn yx-btn-outline-primary !py-1.5 !px-4 text-sm"
      (click)="cancel()">
      {{ data.cancelText || 'Cancel' }}
    </button>

    <!-- CONFIRM -->
    <button
      *ngIf="data.showActions !== false"
      type="button"
      class="ti-btn !py-1.5 !px-4 text-sm text-white"
      [ngClass]="{
        'bg-primary': data.variant === 'info',
        'bg-warning': data.variant === 'warning',
        'bg-danger': data.variant === 'danger'
      }"
      (click)="confirm()">
      {{ data.confirmText || 'Confirm' }}
    </button>

  </div>

</div>
